services:
  amneziawg:
    image: docker-amneziawg
    container_name: amneziawg
    ports:
      - "51820:51820/udp" # HostPort:ContainerPort
    volumes:
      - ./config:/config/amneziawg
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
